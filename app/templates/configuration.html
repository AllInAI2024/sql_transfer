{% extends "base.html" %}

{% block title %}配置 - {{ app_name }}{% endblock %}

{% block content %}
<div class="page-header">
    <h2>系统配置</h2>
    <p>系统配置管理，包括数据库连接、API 密钥等设置。</p>
</div>

<div class="config-sections">
    <!-- 基本配置 -->
    <div class="config-section">
        <h3>基本配置</h3>
        <div class="config-form">
            <div class="form-group">
                <label for="app_name">应用名称</label>
                <input type="text" id="app_name" value="{{ app_name }}" class="form-input">
            </div>
            <div class="form-group">
                <label for="debug_mode">
                <input type="checkbox" id="debug_mode" checked> 调试模式
            </label>
            </div>
            <button class="btn btn-primary">保存基本配置</button>
        </div>
    </div>

    <!-- 数据库配置 -->
    <div class="config-section">
        <h3>数据库配置</h3>
        <div class="config-form">
            <div class="form-group">
                <label for="database_url">数据库连接 URL</label>
                <input type="text" id="database_url" value="sqlite:///./sql_transfer.db" class="form-input">
            </div>
            <div class="form-group">
                <button class="btn btn-secondary">测试连接</button>
                <button class="btn btn-primary">保存数据库配置</button>
            </div>
        </div>
    </div>

    <!-- OpenAI 配置 -->
    <div class="config-section">
        <h3>OpenAI 兼容 API 配置</h3>
        <div class="config-form">
            <div class="form-group">
                <label for="openai_api_key">API 密钥</label>
                <input type="password" id="openai_api_key" placeholder="请输入 API 密钥" class="form-input">
            </div>
            <div class="form-group">
                <label for="openai_api_base">API 基础地址 (可选)</label>
                <input type="text" id="openai_api_base" placeholder="例如: https://api.openai.com/v1" class="form-input">
            </div>
            <div class="form-group">
                <label for="openai_model_name">模型名称</label>
                <select id="openai_model_name" class="form-input">
                    <option value="gpt-3.5-turbo" selected>gpt-3.5-turbo</option>
                    <option value="gpt-4">gpt-4</option>
                    <option value="gpt-4-turbo">gpt-4-turbo</option>
                </select>
            </div>
            <div class="form-group">
                <button class="btn btn-secondary">测试连接</button>
                <button class="btn btn-primary">保存 OpenAI 配置</button>
            </div>
        </div>
    </div>

    <!-- 其他配置 -->
    <div class="config-section">
        <h3>其他配置</h3>
        <div class="config-form">
            <div class="form-group">
                <label for="server_port">服务端口</label>
                <input type="number" id="server_port" value="6088" class="form-input">
            </div>
            <div class="form-group">
                <label for="sse_timeout">SSE 超时时间 (秒)</label>
                <input type="number" id="sse_timeout" value="300" class="form-input">
            </div>
            <div class="form-group">
                <label for="max_concurrent_tasks">最大并发任务数</label>
                <input type="number" id="max_concurrent_tasks" value="5" class="form-input">
            </div>
            <button class="btn btn-primary">保存其他配置</button>
        </div>
    </div>
</div>

<div class="config-actions">
    <button class="btn btn-secondary">重置为默认值</button>
    <button class="btn btn-primary btn-large">保存所有配置</button>
</div>
{% endblock %}
